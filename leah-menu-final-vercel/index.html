<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leah 专属菜单</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f5f7fb;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .app {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .topbar,
      .row,
      .summary {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
      }

      .topbar {
        margin-bottom: 20px;
      }

      .brand {
        margin: 0 0 4px;
        color: #0f766e;
        font-weight: 800;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: 38px;
      }

      .hint {
        color: #667085;
        line-height: 1.6;
      }

      .view-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        color: #fff;
        background: #0f766e;
        cursor: pointer;
        font-weight: 800;
      }

      button.secondary {
        color: #263442;
        background: #e6edf5;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #cfd8e3;
        border-radius: 8px;
        padding: 10px 12px;
        background: #fff;
      }

      textarea {
        min-height: 72px;
        margin-top: 12px;
        resize: vertical;
      }

      .order-layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 18px;
        align-items: start;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .card,
      .panel,
      .cart-item,
      .order-item {
        border: 1px solid #d8e2ee;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 10px 24px rgba(31, 41, 51, 0.06);
      }

      .card,
      .panel,
      .cart-item,
      .order-item {
        padding: 18px;
      }

      .price {
        color: #0f766e;
        font-size: 24px;
        font-weight: 900;
      }

      .cart-list,
      .orders-list {
        display: grid;
        gap: 14px;
      }

      .item-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .small-btn {
        width: 34px;
        min-height: 34px;
        padding: 0;
      }

      .sticky-cart {
        position: sticky;
        top: 18px;
      }

      .status {
        width: fit-content;
        padding: 5px 10px;
        border-radius: 999px;
        color: #7a3e00;
        background: #fff4d6;
        font-weight: 800;
      }

      .empty {
        padding: 24px;
        border: 1px dashed #b6c4d4;
        border-radius: 8px;
        color: #667085;
        background: #fff;
      }

      .success {
        margin-bottom: 16px;
        padding: 18px;
        border: 1px solid #9fd7c8;
        border-radius: 8px;
        background: #e9fbf5;
      }

      .lock-panel {
        width: min(460px, 100%);
        margin: 60px auto;
        display: grid;
        gap: 12px;
      }

      .hidden {
        display: none;
      }

      .error {
        margin-bottom: 0;
        color: #b42318;
        font-weight: 800;
      }

      @media (max-width: 820px) {
        .topbar,
        .summary {
          align-items: stretch;
          flex-direction: column;
        }

        .order-layout,
        .cards {
          grid-template-columns: 1fr;
        }

        .sticky-cart {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="brand">Leah 专属菜单</p>
          <h1 id="pageTitle">客人点餐</h1>
          <p id="tableText" class="hint">当前桌号：3</p>
        </div>
        <div class="view-tabs">
          <button id="customerBtn" type="button">客人点餐</button>
          <button id="adminBtn" class="secondary" type="button">老板后台</button>
        </div>
      </header>

      <section id="successBox" class="success hidden">
        <h2>订单已提交</h2>
        <p id="successText" class="hint"></p>
      </section>

      <section id="customerView" class="order-layout">
        <div>
          <h2>今日菜单</h2>
          <div id="menuList" class="cards"></div>
        </div>

        <aside class="panel sticky-cart">
          <h2>当前订单</h2>
          <div id="cartList" class="cart-list"></div>
          <div class="summary">
            <strong id="totalText">合计：¥0.00</strong>
            <button id="submitBtn" type="button">提交订单</button>
          </div>
        </aside>
      </section>

      <section id="adminView" class="hidden">
        <section id="adminLock" class="panel lock-panel">
          <p class="brand">Owner Only</p>
          <h2>老板入口</h2>
          <p class="hint">请输入老板 PIN 查看订单。</p>
          <input id="pinInput" type="password" placeholder="输入 PIN" />
          <button id="unlockBtn" type="button">进入后台</button>
          <p id="pinError" class="error hidden">PIN 不正确，请重试。</p>
        </section>

        <section id="adminContent" class="hidden">
          <div class="row">
            <h2>订单后台</h2>
            <button id="refreshBtn" class="secondary" type="button">刷新订单</button>
          </div>
          <section id="ordersList" class="orders-list"></section>
        </section>
      </section>
    </main>

    <script>
      const menuItems = [
        { id: 1, name: "招牌牛肉饭", description: "嫩牛肉、洋葱、温泉蛋。", price: 38, category: "主食" },
        { id: 2, name: "番茄意面", description: "番茄酱、罗勒和芝士。", price: 42, category: "主食" },
        { id: 3, name: "香煎鸡排", description: "外脆里嫩，配黑椒酱。", price: 48, category: "主食" },
        { id: 4, name: "宫保鸡丁饭", description: "鸡丁、花生和微辣酱汁。", price: 36, category: "主食" },
        { id: 5, name: "黑椒牛柳炒面", description: "牛柳、青椒和黑椒酱。", price: 39, category: "主食" },
        { id: 6, name: "虾仁蛋炒饭", description: "虾仁、鸡蛋和米饭快炒。", price: 35, category: "主食" },
        { id: 7, name: "凯撒沙拉", description: "生菜、鸡胸肉和凯撒酱。", price: 32, category: "小食" },
        { id: 8, name: "薯条", description: "现炸薯条，配番茄酱。", price: 18, category: "小食" },
        { id: 9, name: "蒜香鸡翅", description: "外皮焦香，适合分享。", price: 28, category: "小食" },
        { id: 10, name: "番茄蛋花汤", description: "热汤暖胃，口味清淡。", price: 12, category: "汤品" },
        { id: 11, name: "柠檬茶", description: "清爽解腻，少糖可备注。", price: 16, category: "饮品" },
        { id: 12, name: "芒果布丁", description: "香甜顺滑的小甜品。", price: 16, category: "甜品" }
      ];

      const pageTitle = document.querySelector("#pageTitle");
      const tableText = document.querySelector("#tableText");
      const customerBtn = document.querySelector("#customerBtn");
      const adminBtn = document.querySelector("#adminBtn");
      const customerView = document.querySelector("#customerView");
      const adminView = document.querySelector("#adminView");
      const menuList = document.querySelector("#menuList");
      const cartList = document.querySelector("#cartList");
      const totalText = document.querySelector("#totalText");
      const submitBtn = document.querySelector("#submitBtn");
      const successBox = document.querySelector("#successBox");
      const successText = document.querySelector("#successText");
      const adminLock = document.querySelector("#adminLock");
      const adminContent = document.querySelector("#adminContent");
      const pinInput = document.querySelector("#pinInput");
      const unlockBtn = document.querySelector("#unlockBtn");
      const pinError = document.querySelector("#pinError");
      const refreshBtn = document.querySelector("#refreshBtn");
      const ordersList = document.querySelector("#ordersList");

      const tableNumber = "3";
      const ownerPin = "1234";
      let cart = [];
      let orders = [];

      function money(amount) {
        return `¥${amount.toFixed(2)}`;
      }

      function getCartTotal() {
        return cart.reduce((total, item) => total + item.price * item.quantity, 0);
      }

      function renderMenu() {
        menuList.innerHTML = menuItems
          .map(
            (item) => `
              <article class="card">
                <p class="hint">${item.category}</p>
                <h3>${item.name}</h3>
                <p class="hint">${item.description}</p>
                <div class="row">
                  <span class="price">${money(item.price)}</span>
                  <button data-id="${item.id}" type="button">加入</button>
                </div>
              </article>
            `
          )
          .join("");
      }

      function renderCart() {
        if (cart.length === 0) {
          cartList.innerHTML = `<div class="empty">还没有选择菜品。</div>`;
          totalText.textContent = "合计：¥0.00";
          submitBtn.disabled = true;
          return;
        }

        submitBtn.disabled = false;
        cartList.innerHTML = cart
          .map(
            (item) => `
              <article class="cart-item">
                <div class="row">
                  <div>
                    <h3>${item.name}</h3>
                    <p class="hint">${money(item.price)} / 份</p>
                  </div>
                  <div class="item-controls">
                    <button class="small-btn secondary" data-action="minus" data-id="${item.id}" type="button">-</button>
                    <span>${item.quantity}</span>
                    <button class="small-btn secondary" data-action="plus" data-id="${item.id}" type="button">+</button>
                  </div>
                </div>
                <textarea data-id="${item.id}" placeholder="备注：例如少辣、不要葱">${item.notes || ""}</textarea>
              </article>
            `
          )
          .join("");

        totalText.textContent = `合计：${money(getCartTotal())}`;
      }

      function renderOrders() {
        if (orders.length === 0) {
          ordersList.innerHTML = `<div class="empty">暂时没有订单。</div>`;
          return;
        }

        ordersList.innerHTML = orders
          .map(
            (order) => `
              <article class="order-item">
                <div class="row">
                  <div>
                    <h3>订单号 ${order.orderNumber}</h3>
                    <p class="hint">桌号 ${order.table} · ${order.createdAt}</p>
                  </div>
                  <span class="status">${order.status}</span>
                </div>
                ${order.items
                  .map(
                    (item) => `
                      <p>
                        <strong>${item.name}</strong>
                        × ${item.quantity}
                        <span class="hint">备注：${item.notes || "无"}</span>
                      </p>
                    `
                  )
                  .join("")}
                <div class="row">
                  <strong>总价：${money(order.total)}</strong>
                  <select data-id="${order.id}">
                    <option ${order.status === "新订单" ? "selected" : ""}>新订单</option>
                    <option ${order.status === "制作中" ? "selected" : ""}>制作中</option>
                    <option ${order.status === "已完成" ? "selected" : ""}>已完成</option>
                  </select>
                </div>
              </article>
            `
          )
          .join("");
      }

      function showCustomer() {
        pageTitle.textContent = "客人点餐";
        tableText.textContent = `当前桌号：${tableNumber}`;
        customerView.classList.remove("hidden");
        adminView.classList.add("hidden");
      }

      function showAdmin() {
        pageTitle.textContent = "老板后台";
        tableText.textContent = "查看客人提交的订单";
        customerView.classList.add("hidden");
        adminView.classList.remove("hidden");
        renderOrders();
      }

      menuList.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;

        const item = menuItems.find((menuItem) => menuItem.id === Number(button.dataset.id));
        const found = cart.find((cartItem) => cartItem.id === item.id);

        if (found) {
          found.quantity += 1;
        } else {
          cart.push({ ...item, quantity: 1, notes: "" });
        }

        renderCart();
      });

      cartList.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;

        const item = cart.find((cartItem) => cartItem.id === Number(button.dataset.id));
        if (!item) return;

        if (button.dataset.action === "plus") item.quantity += 1;
        if (button.dataset.action === "minus") item.quantity -= 1;

        cart = cart.filter((cartItem) => cartItem.quantity > 0);
        renderCart();
      });

      cartList.addEventListener("input", (event) => {
        if (event.target.tagName !== "TEXTAREA") return;

        const item = cart.find((cartItem) => cartItem.id === Number(event.target.dataset.id));
        if (!item) return;

        item.notes = event.target.value;
      });

      submitBtn.addEventListener("click", () => {
        const orderId = Date.now();
        const orderNumber = `L${String(orderId).slice(-6)}`;

        orders.unshift({
          id: orderId,
          orderNumber,
          table: tableNumber,
          items: JSON.parse(JSON.stringify(cart)),
          total: getCartTotal(),
          status: "新订单",
          createdAt: new Date().toLocaleString()
        });

        cart = [];
        successText.textContent = `订单号：${orderNumber}。老板后台已经可以看到。`;
        successBox.classList.remove("hidden");
        renderCart();
      });

      unlockBtn.addEventListener("click", () => {
        if (pinInput.value !== ownerPin) {
          pinError.classList.remove("hidden");
          return;
        }

        pinError.classList.add("hidden");
        adminLock.classList.add("hidden");
        adminContent.classList.remove("hidden");
        renderOrders();
      });

      ordersList.addEventListener("change", (event) => {
        if (event.target.tagName !== "SELECT") return;

        const order = orders.find((item) => item.id === Number(event.target.dataset.id));
        if (!order) return;

        order.status = event.target.value;
        renderOrders();
      });

      customerBtn.addEventListener("click", showCustomer);
      adminBtn.addEventListener("click", showAdmin);
      refreshBtn.addEventListener("click", renderOrders);

      renderMenu();
      renderCart();
      showCustomer();
    </script>
  </body>
</html>
